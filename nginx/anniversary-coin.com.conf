# /etc/nginx/sites-available/anniversary-coin.com
# Symlink: ln -s /etc/nginx/sites-available/anniversary-coin.com /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name anniversary-coin.com www.anniversary-coin.com;
    return 301 https://$host$request_uri;
}

# HTTPS — reverse proxy to Next.js
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name anniversary-coin.com www.anniversary-coin.com;

    # SSL certificates (issued by certbot)
    ssl_certificate     /etc/letsencrypt/live/anniversary-coin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anniversary-coin.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Uploaded files (served directly by Nginx — faster than Node)
    location /uploads/ {
        alias /var/www/anniversary-coin/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
